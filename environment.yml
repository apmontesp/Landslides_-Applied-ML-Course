name: landslide4sense
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ── Python ──────────────────────────────────────────────────
  - python=3.10.13

  # ── Core científico ─────────────────────────────────────────
  - numpy>=1.24.0
  - scipy>=1.11.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - seaborn>=0.12.0
  - pillow>=10.0.0

  # ── Datos geoespaciales ──────────────────────────────────────
  - h5py>=3.9.0
  - rasterio>=1.3.8
  - pyproj>=3.6.0

  # ── Deep Learning (CPU/GPU) ──────────────────────────────────
  - pytorch>=2.1.0
  - torchvision>=0.16.0
  - torchaudio>=2.1.0
  - pytorch-cuda=12.1     # Cambiar a "cpuonly" si no hay GPU

  # ── Notebooks ───────────────────────────────────────────────
  - jupyter>=1.0.0
  - ipywidgets>=8.1.0
  - ipykernel>=6.25.0
  - nb_conda_kernels

  # ── Utilidades ───────────────────────────────────────────────
  - tqdm>=4.66.0
  - pyyaml>=6.0.1

  # ── pip — paquetes no disponibles en conda ───────────────────
  - pip
  - pip:
    - segmentation-models-pytorch>=0.3.3
    - timm>=0.9.7
    - tensorboard>=2.14.0
    - torchmetrics>=1.2.0
    - einops>=0.7.0
    - black>=23.9.1
    - isort>=5.12.0
    - flake8>=6.1.0
