# ============================================================
# Hiperparámetros ajustados para estabilidad en Google Colab
# ============================================================

experiment_name: efficientnet_b4_finetuned
model_arch: efficientnet_b4

# ── Rutas ────────────────────────────────────────────────────
data_root: ./data
output_dir: ./results/efficientnet_b4
checkpoint_dir: ./checkpoints/efficientnet_b4

# ── Dataset ──────────────────────────────────────────────────
n_channels: 14
patch_size: 128
n_folds: 5
seed: 42

# ── Entrenamiento ─────────────────────────────────────────────
# Reducimos batch_size para evitar Out of Memory (OOM)
# Bajamos num_workers para evitar bloqueos con Google Drive
epochs: 50
batch_size: 16       # <--- CAMBIO: De 24 a 16 para seguridad en T4 GPU
num_workers: 2       # <--- CAMBIO: De 4 a 2 para estabilidad en Colab
pin_memory: true

# ── Optimizador ───────────────────────────────────────────────
optimizer: adamw
lr_head: 0.0001
lr_backbone: 0.00001
weight_decay: 0.0001
freeze_epochs: 5

# ── Scheduler ─────────────────────────────────────────────────
scheduler: cosine
T_max: 50
eta_min: 0.0000001

# ── Función de pérdida ────────────────────────────────────────
loss: weighted_bce
pos_weight: 0.703   # Basado en la proporción de positivos detectada

# ── Umbral y Early Stopping ───────────────────────────────────
threshold: 0.5
optimize_threshold: true
early_stopping: true
patience: 15
monitor: val_f1
mode: max

# ── Data Augmentation ─────────────────────────────────────────
augmentation: true
aug_hflip_prob: 0.5
aug_vflip_prob: 0.5
aug_rotate90_prob: 0.5
aug_brightness_prob: 0.3
aug_noise_prob: 0.2
aug_noise_std: 0.02

# ── Normalización ─────────────────────────────────────────────
normalize: true
norm_strategy: per_channel

# ── Preentrenamiento ──────────────────────────────────────────
pretrained: true
pretrained_weights: imagenet

# ── Hardware ──────────────────────────────────────────────────
device: auto
