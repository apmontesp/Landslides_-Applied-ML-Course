# ============================================================
# configs/efficientnet_b4.yaml
# Hiperparámetros para EfficientNet-B4 fine-tuned — Landslide4Sense
# Protocolo ejecutado: 2-Fold Stratified CV, Google Colab GPU T4
# Uso: python scripts/run_training.py --config configs/efficientnet_b4.yaml
# ============================================================

experiment_name: efficientnet_b4_finetuned
model_arch: efficientnet_b4

# ── Rutas ────────────────────────────────────────────────────
data_root: ./data
output_dir: ./results/efficientnet_b4
checkpoint_dir: ./checkpoints/efficientnet_b4

# ── Dataset ──────────────────────────────────────────────────
n_channels: 14
patch_size: 128
n_folds: 2               # 2-Fold Stratified CV (optimizado para Colab T4)
seed: 42

# ── Entrenamiento ─────────────────────────────────────────────
epochs: 20               # Máximo por pliegue (restricción cómputo Colab)
batch_size: 16           # Reducido para evitar OOM en GPU T4
num_workers: 2           # Reducido para estabilidad en Colab
pin_memory: true

# ── Optimizador ───────────────────────────────────────────────
optimizer: adamw
lr_head: 0.0001          # 1e-4 — cabeza de clasificación (nueva)
lr_backbone: 0.00001     # 1e-5 — backbone preentrenado (10× menor)
weight_decay: 0.0001
freeze_epochs: 5         # Épocas con backbone congelado antes del fine-tuning completo

# ── Scheduler ─────────────────────────────────────────────────
scheduler: one_cycle     # OneCycleLR — convergencia acelerada
max_lr: 0.0001

# ── Función de pérdida ────────────────────────────────────────
loss: weighted_bce
pos_weight: 0.70         # n_neg/n_pos = 1568/2231 (EDA real)

# ── Umbral ────────────────────────────────────────────────────
threshold: 0.5
optimize_threshold: true

# ── Early Stopping ────────────────────────────────────────────
early_stopping: true
patience: 5
monitor: val_f1
mode: max

# ── Data Augmentation ─────────────────────────────────────────
augmentation: true
aug_hflip_prob: 0.5
aug_vflip_prob: 0.5
aug_rotate90_prob: 0.5

# ── Normalización ─────────────────────────────────────────────
normalize: true
norm_strategy: per_channel

# ── Preentrenamiento ──────────────────────────────────────────
pretrained: true
pretrained_weights: imagenet
init_strategy: mean          # Mean-initialization para adaptar 3 → 14 canales

# ── Arquitectura ──────────────────────────────────────────────
# EfficientNet-B4: escalado compuesto depth=1.8, width=1.4, resolution=1.3
# 19M parámetros (vs 25M de ResNet-50)

# ── Hardware ──────────────────────────────────────────────────
device: auto
use_amp: false

# ── Logging ───────────────────────────────────────────────────
log_interval: 10
save_best_only: true
verbose: true

# ── Resultados obtenidos (2-Fold CV, 2025) ───────────────────
# F1 medio:   0.756
# AUC-ROC:   ~0.823  (mayor AUC-ROC que RF y ResNet-50)
# AUC-PR:     0.807 / 0.839 (por pliegue)
